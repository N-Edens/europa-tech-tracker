# Europa Tech Tracker - RSS Sources Configuration
# Phase 1 MVP: Primary European tech news sources

sources:
  tech_eu:
    name: "Tech.EU"
    url: "https://tech.eu/feed/"
    type: "rss" 
    priority: "high"
    description: "Leading European startup and tech news"
    enabled: true
    
  sifted_eu:
    name: "Sifted.EU" 
    url: "https://sifted.eu/feed/"
    type: "rss"
    priority: "high"
    description: "European business and tech news by Financial Times"
    enabled: false  # Temporarily disabled due to 403 error
    
  the_next_web:
    name: "The Next Web"
    url: "https://thenextweb.com/feed/"
    type: "rss"
    priority: "medium"
    description: "Global tech news with European focus filter"
    enabled: true
    keywords_bonus: ["europe", "european", "eu"]
    
  ovhcloud_blog:
    name: "OVHcloud Blog"
    url: "https://blog.ovhcloud.com/feed/"
    type: "rss"
    priority: "medium"
    description: "European cloud provider insights and updates"
    enabled: true
    
  sap_news:
    name: "SAP News"
    url: "https://news.sap.com/feed/"
    type: "rss"
    priority: "medium"
    description: "Enterprise software news from European tech giant"
    enabled: true
    
  techcrunch_europe:
    name: "TechCrunch Europe"
    url: "https://techcrunch.com/category/europe/feed/"
    type: "rss"
    priority: "medium"
    description: "TechCrunch European startup coverage"
    enabled: true
    
  european_startup_news:
    name: "EU-Startups"
    url: "https://www.eu-startups.com/feed/"
    type: "rss"
    priority: "high"
    description: "Dedicated European startup news platform"
    enabled: true

