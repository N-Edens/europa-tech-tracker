name: 🧪 Test Suite

# Automated testing for all phases of Europa Tech Tracker
# Runs on code changes and can be triggered manually

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
    
  workflow_dispatch:
    inputs:
      test_suite:
        description: 'Test suite to run'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - unit
          - integration
          - workflow
      coverage:
        description: 'Generate coverage report'
        required: false
        default: true
        type: boolean
      upload_results:
        description: 'Upload test results'
        required: false
        default: true
        type: boolean

jobs:
  test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        python-version: ['3.11', '3.12']
        
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🐍 Setup Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        
    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install -r requirements-dev.txt
        
    - name: 🧪 Run test suite
      run: |
        # Determine test suite to run
        if [ "${{ github.event.inputs.test_suite }}" != "" ]; then
          TEST_SUITE="${{ github.event.inputs.test_suite }}"
        else
          TEST_SUITE="all"
        fi
        
        # Determine coverage setting
        if [ "${{ github.event.inputs.coverage }}" == "true" ] || [ "${{ github.event.inputs.coverage }}" == "" ]; then
          COVERAGE_FLAG="--coverage"
        else
          COVERAGE_FLAG=""
        fi
        
        echo "Running test suite: $TEST_SUITE"
        python run_tests.py --suite $TEST_SUITE $COVERAGE_FLAG --verbose
        
    - name: 📊 Upload coverage reports
      if: ${{ github.event.inputs.coverage != 'false' }}
      uses: codecov/codecov-action@v3
      with:
        files: ./coverage.xml
        name: europa-tech-tracker-coverage
        flags: unittests
        
    - name: 📂 Upload test results
      if: ${{ github.event.inputs.upload_results != 'false' && always() }}
      uses: actions/upload-artifact@v3
      with:
        name: test-results-python${{ matrix.python-version }}
        path: |
          htmlcov/
          .pytest_cache/
          *.xml
          
    - name: 🔍 Validate configuration files
      run: |
        echo "Validating YAML configurations..."
        python -c 'import yaml; from pathlib import Path; config_files = ["config/sources.yaml", ".github/workflows/daily_tracker.yml", ".github/workflows/weekly_summary.yml", ".github/workflows/manual_run.yml"]; [print(f"✅ {config_file} is valid YAML") if Path(config_file).exists() and yaml.safe_load(open(config_file, "r")) is not None else print(f"⚠️  {config_file} not found") for config_file in config_files]'
        
    - name: 🚀 Test Phase 1 (MVP) compatibility
      run: |
        echo "Testing Phase 1 MVP functionality..."
        python -c 'import sys; sys.path.append("src"); from utils.cache import CacheManager; from utils.config_loader import ConfigLoader; print("✅ Phase 1 imports successful")'
        
    - name: 🔧 Test Phase 2 (Enhanced) compatibility  
      run: |
        echo "Testing Phase 2 enhanced functionality..."
        python -c 'import sys; sys.path.append("src"); from utils.deduplicator import ArticleDeduplicator; from utils.cache import CacheManager; print("✅ Phase 2 imports successful")'
        
    - name: ⚙️ Test Phase 3 (Automation) compatibility
      run: |
        echo "Testing Phase 3 automation functionality..."
        python -c 'import sys; sys.path.append("src"); from utils.logger import Logger; print("✅ Phase 3 imports successful")'
        
    - name: 📋 Generate test summary
      if: always()
      run: |
        echo "## 🧪 Test Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "**Python Version:** ${{ matrix.python-version }}" >> $GITHUB_STEP_SUMMARY
        echo "**Test Suite:** ${{ github.event.inputs.test_suite || 'all' }}" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        # Add phase compatibility results
        echo "### 🚀 Phase Compatibility" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Phase 1 (MVP): RSS scraping and basic processing" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ Phase 2 (Enhanced): Caching and deduplication" >> $GITHUB_STEP_SUMMARY  
        echo "- ✅ Phase 3 (Automation): Logging and workflows" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        
        if [ -f htmlcov/index.html ]; then
          echo "📊 **Coverage report generated**" >> $GITHUB_STEP_SUMMARY
        fi
        
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
        echo "- [Configuration](config/sources.yaml)" >> $GITHUB_STEP_SUMMARY
        echo "- [Workflows](.github/workflows/)" >> $GITHUB_STEP_SUMMARY
        echo "- [Test Files](tests/)" >> $GITHUB_STEP_SUMMARY

  workflow-validation:
    runs-on: ubuntu-latest
    needs: test
    
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      
    - name: 🔍 Validate workflow syntax
      run: |
        echo "Validating GitHub Actions workflow syntax..."
        python scripts/validate_workflows.py
        
    - name: 📊 Summary
      run: |
        echo "## 🎯 Workflow Validation Results" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "All GitHub Actions workflows have been validated:" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Daily Tracker**: Automated weekday collection" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Weekly Summary**: Sunday trend analysis" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Manual Run**: On-demand testing and debugging" >> $GITHUB_STEP_SUMMARY
        echo "- ✅ **Test Suite**: Automated testing on changes" >> $GITHUB_STEP_SUMMARY