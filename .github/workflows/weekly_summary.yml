name: 📊 Weekly Europa Tech Summary

# Weekly summary and trend analysis
# Runs every Sunday at 21:00 Copenhagen time

on:
  schedule:
    - cron: '0 20 * * 0'  # Sunday 21:00 Copenhagen (20:00 UTC)
    
  workflow_dispatch:
    inputs:
      days_back:
        description: 'Days to analyze (default: 7)'
        required: false
        default: '7'
        type: string
      include_trends:
        description: 'Include trend analysis'
        required: false
        default: true
        type: boolean

jobs:
  weekly_summary:
    runs-on: ubuntu-latest
    
    permissions:
      contents: write
      
    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        
    - name: 🐍 Setup Python environment
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: 📦 Install dependencies
      run: |
        pip install -r requirements.txt
        pip install matplotlib seaborn  # For trend visualization
        
    - name: 📊 Generate weekly summary
      run: |
        echo "Generating weekly summary..."
        export DAYS_BACK=${{ github.event.inputs.days_back || '7' }}
        python scripts/weekly_summary.py
        echo "SUMMARY_GENERATED=true" >> $GITHUB_ENV
        
    - name: 💾 Commit weekly summary
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "Europa Tech Weekly Summary Bot"
        
        # Add generated files
        git add output/weekly_summaries/ || true
        
        if git diff --staged --quiet; then
          echo "No weekly summary to commit"
        else
          {
            echo "📊 Weekly Europa Tech Summary - $(date '+%Y-%m-%d')"
            echo ""
            echo "✨ Weekly analysis completed:"
            echo "• Trend analysis and category breakdown"
            echo "• Source performance review"
            echo "• Keyword trending analysis"
            echo ""
            echo "🤖 Generated automatically by Weekly Summary workflow"
          } > /tmp/commit_msg.txt
          git commit -F /tmp/commit_msg.txt
          
          git push origin main
          echo "Weekly summary committed successfully"
        fi
        
    - name: 📧 Create issue summary (if enabled)
      if: github.event_name == 'schedule'  # Only for automatic runs
      uses: actions/github-script@v6
      with:
        script: |
          const fs = require('fs');
          const path = require('path');
          
          // Find latest weekly summary
          const summariesDir = 'output/weekly_summaries';
          if (fs.existsSync(summariesDir)) {
            const files = fs.readdirSync(summariesDir)
              .filter(f => f.includes('weekly_summary_'))
              .sort()
              .reverse();
              
            if (files.length > 0) {
              const latestSummary = fs.readFileSync(
                path.join(summariesDir, files[0]), 
                'utf8'
              );
              
              // Extract key metrics for issue
              const lines = latestSummary.split('\n');
              const totalArticles = lines.find(l => l.includes('Total articles'))?.split('**')[2] || '0';
              const avgRelevance = lines.find(l => l.includes('Average relevance'))?.split('**')[2] || '0';
              
              // Create issue with summary
              const body = [
                '## \ud83c\uddea\ud83c\uddfa Europa Tech Weekly Summary',
                '',
                '**Quick Stats:**',
                '- Total articles: ' + totalArticles,
                '- Average relevance: ' + avgRelevance,
                '',
                '[Full Report](https://github.com/' + context.repo.owner + '/' + context.repo.repo + '/blob/main/' + summariesDir + '/' + files[0] + ')',
                '',
                'This issue is automatically created every Sunday with weekly statistics.'
              ].join('\n');
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: '\ud83d\udcca Weekly Summary - ' + new Date().toISOString().split('T')[0],
                body: body,
                labels: ['weekly-summary', 'automation']
              });
            }
          }
          
    - name: 📊 Update metrics (if available)
      run: |
        echo "## 📊 Weekly Summary Generated" >> $GITHUB_STEP_SUMMARY
        echo "Weekly trend analysis completed successfully." >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### 🔗 Links" >> $GITHUB_STEP_SUMMARY
        echo "- [Weekly Summaries](https://github.com/N-Edens/europa-tech-tracker/tree/main/output/weekly_summaries)" >> $GITHUB_STEP_SUMMARY
        echo "- [Daily Reports](https://github.com/N-Edens/europa-tech-tracker/tree/main/output/daily_reports)" >> $GITHUB_STEP_SUMMARY