[tool:pytest]
minversion = 7.0
addopts = -v --tb=short --cov=src --cov-report=term-missing --cov-report=html
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    unit: Unit tests for individual components
    integration: Integration tests for combined functionality  
    workflow: Tests for GitHub Actions workflows
    slow: Tests that take longer to run
    network: Tests that require internet connectivity

[coverage:run]
source = src
omit = 
    */tests/*
    */venv/*
    */build/*
    */__pycache__/*
    */site-packages/*

[coverage:report]
exclude_lines =
    pragma: no cover
    def __repr__
    if self.debug:
    if settings.DEBUG
    raise AssertionError
    raise NotImplementedError
    if 0:
    if __name__ == .__main__.:
    class .*\bProtocol\):
    @(abc\.)?abstractmethod